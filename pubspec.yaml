name: reporting_system
description: A new Flutter project.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  http: ^1.2.0
  flutter_localizations:
    sdk: flutter
  flutter:
    sdk: flutter
  fl_chart: ^1.2.0
  image_picker: ^1.0.7
  google_fonts: ^8.0.2
  cupertino_icons: ^1.0.2
  flutter_map: ^8.3.0
  latlong2: ^0.9.0
  geocoding: ^4.0.0
  rename: ^3.1.0
  google_maps_flutter: ^2.5.3  # لعرض الخريطة
  geolocator: ^14.0.2          # للحصول على موقع اليوزر الحالي (GPS)
  shared_preferences: ^2.3.3
  flutter_image_compress: ^2.3.0
  jwt_decoder: ^2.0.1
  timeago: ^3.7.0
  toastification: ^3.2.0
  firebase_messaging: ^16.2.0
  firebase_core: ^4.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/images/App_Icon.PNG"
  min_sdk_android: 21

flutter:
  uses-material-design: true

